  <!-- Wordmark -->
  <text
    x="90"
    y="60"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-weight="800"
    font-size="40"
    letter-spacing="-1"
    fill="white"
  >Rude<tspan fill="#fec824">Ops</tspan></text>
</svg>
