<svg viewBox="0 0 380 90" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="RudeOps">
  <!-- Background -->
  <rect width="380" height="90" rx="14" fill="#181818"/>

  <!-- Yellow icon square -->
  <rect x="16" y="16" width="58" height="58" rx="10" fill="#fec824"/>

  <!-- Terminal chevron > -->
  <path d="M30 36l11 11-11 11" stroke="#181818" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Underscore _ -->
