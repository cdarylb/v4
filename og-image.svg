<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#181818"/>

  <!-- Subtle vignette gradient -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="0%" stop-color="#242424"/>
    <stop offset="100%" stop-color="#111111"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#vignette)"/>

  <!-- Yellow top accent bar -->
  <rect width="1200" height="4" fill="#fec824"/>

  <!-- Logo group — elements from logo-newsletter-large.svg scaled 1.5x, centered -->
  <!-- Original: 380×90 → at 1.5x: 570×135 — horizontal offset: (1200-570)/2 = 315 -->
  <g transform="translate(315, 198) scale(1.5)">
    <!-- Background card (optional, subtle) -->
    <!-- Yellow icon square -->
    <rect x="16" y="16" width="58" height="58" rx="10" fill="#fec824"/>
    <!-- Terminal chevron > -->
    <path d="M30 36l11 11-11 11" stroke="#181818" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Underscore _ -->
    <line x1="47" y1="58" x2="62" y2="58" stroke="#181818" stroke-width="4" stroke-linecap="round"/>
    <!-- Wordmark -->
    <text
      x="90" y="60"
      font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
      font-weight="800"
      font-size="40"
      letter-spacing="-1"
      fill="white"
    >Rude<tspan fill="#fec824">Ops</tspan></text>
  </g>

  <!-- Separator -->
  <line x1="520" y1="388" x2="680" y2="388" stroke="#fec824" stroke-width="1" opacity="0.25"/>

  <!-- Tagline -->
  <text
    x="600" y="430"
    text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-weight="400"
    font-size="22"
    fill="#9ca3af"
  >La newsletter dédiée à la tech en général et au devops en particulier.</text>

  <!-- URL -->
  <text
    x="600" y="578"
    text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-weight="500"
    font-size="15"
    fill="#fec824"
    opacity="0.45"
  >rudeops.com</text>
</svg>
